# =============================================================
# MindHub — MySQL Database Configuration
# =============================================================
# Each team member should update these values to match their
# local MySQL installation. Do NOT commit personal credentials.
# =============================================================

db.driver=com.mysql.cj.jdbc.Driver
db.url=jdbc:mysql://localhost:3306/mindhub_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8
db.username=root
db.password=

# Connection pool settings
db.pool.initialSize=5
db.pool.maxTotal=20
db.pool.maxIdle=10
db.pool.minIdle=5
